name: Release Build

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的标签时触发,如 v1.0.0
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 需要写权限来创建 release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: amd64
            extension: .exe
          - os: macos-latest
            platform: darwin
            arch: arm64
            extension: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.7'
          cache: true

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: 安装 Wails CLI (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 安装 NSIS (Windows)
        if: matrix.platform == 'windows'
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" >> $GITHUB_PATH
        shell: bash

      - name: 验证 NSIS 安装 (Windows)
        if: matrix.platform == 'windows'
        run: makensis -VERSION
        shell: bash

      - name: 安装 Wails CLI (macOS)
        if: matrix.platform == 'darwin'
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: 安装依赖 (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # 安装前端依赖
          if (Test-Path frontend/package.json) {
            cd frontend
            pnpm install
            cd ..
          }
          # 下载 Go 模块
          go mod download

      - name: 安装依赖 (macOS)
        if: matrix.platform == 'darwin'
        run: |
          # 安装前端依赖
          if [ -f frontend/package.json ]; then
            cd frontend
            pnpm install
            cd ..
          fi
          # 下载 Go 模块
          go mod download

      - name: 构建应用 (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          # 确保使用 Windows 路径格式
          MSYS_NO_PATHCONV: 1
        run: |
          wails3 package

      - name: 构建应用 (macOS)
        if: matrix.platform == 'darwin'
        run: |
          wails3 package

      - name: 打包构建产物 (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $outputName = "mimi-${version}-windows-amd64"

          # 创建发布目录
          New-Item -ItemType Directory -Force -Path release

          # 优先查找 NSIS 安装程序
          if (Test-Path "bin/mimi-amd64-installer.exe") {
            Copy-Item "bin/mimi-amd64-installer.exe" -Destination "release/${outputName}-installer.exe"
            Write-Host "✅ 找到 NSIS 安装程序: bin/mimi-amd64-installer.exe"
          } elseif (Test-Path "bin/mimi.exe") {
            Compress-Archive -Path "bin/mimi.exe" -DestinationPath "release/${outputName}.zip"
            Write-Host "✅ 找到可执行文件: bin/mimi.exe"
          } elseif (Test-Path "build/bin/mimi.exe") {
            Compress-Archive -Path "build/bin/mimi.exe" -DestinationPath "release/${outputName}.zip"
            Write-Host "✅ 找到可执行文件: build/bin/mimi.exe"
          } else {
            Write-Error "❌ 找不到构建产物"
            Write-Host "查找 bin/ 目录:"
            Get-ChildItem -Path bin -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            Write-Host "查找 build/bin/ 目录:"
            Get-ChildItem -Path build/bin -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }

      - name: 打包构建产物 (macOS)
        if: matrix.platform == 'darwin'
        run: |
          version="${{ github.ref_name }}"
          outputName="mimi-${version}-darwin-${{ matrix.arch }}"

          # 创建发布目录
          mkdir -p release

          # 查找构建产物并压缩
          if [ -f "bin/mimi.app/Contents/MacOS/mimi" ]; then
            cd bin
            tar -czf "../release/${outputName}.tar.gz" mimi.app
            cd ..
          elif [ -f "build/bin/mimi.app/Contents/MacOS/mimi" ]; then
            cd build/bin
            tar -czf "../../release/${outputName}.tar.gz" mimi.app
            cd ../..
          elif [ -f "bin/mimi" ]; then
            tar -czf "release/${outputName}.tar.gz" -C bin mimi
          elif [ -f "build/bin/mimi" ]; then
            tar -czf "release/${outputName}.tar.gz" -C build/bin mimi
          else
            echo "❌ 找不到构建产物"
            echo "查找 bin/ 目录:"
            ls -R bin/ 2>/dev/null || echo "bin/ 不存在"
            echo "查找 build/bin/ 目录:"
            ls -R build/bin/ 2>/dev/null || echo "build/bin/ 不存在"
            exit 1
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: mimi-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 显示下载的文件
        run: |
          ls -R artifacts/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/mimi-windows-amd64/*
            artifacts/mimi-darwin-arm64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧的 artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            mimi-windows-amd64
            mimi-darwin-arm64
