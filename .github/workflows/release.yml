name: Release Build

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的标签时触发,如 v1.0.0
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 需要写权限来创建 release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: amd64
            extension: .exe
          - os: macos-latest
            platform: darwin
            arch: amd64
            extension: ''
          - os: macos-latest
            platform: darwin
            arch: arm64
            extension: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Wails CLI (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 安装 Wails CLI (macOS)
        if: matrix.platform == 'darwin'
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: 安装依赖 (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # 安装 npm 依赖(如果有前端资源)
          if (Test-Path package.json) {
            npm install
          }
          # 下载 Go 模块
          go mod download

      - name: 安装依赖 (macOS)
        if: matrix.platform == 'darwin'
        run: |
          # 安装 npm 依赖(如果有前端资源)
          if [ -f package.json ]; then
            npm install
          fi
          # 下载 Go 模块
          go mod download

      - name: 构建应用 (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          wails3 package

      - name: 构建应用 (macOS)
        if: matrix.platform == 'darwin'
        run: |
          wails3 package

      - name: 打包构建产物 (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $outputName = "mimi-${version}-windows-amd64"

          # 创建发布目录
          New-Item -ItemType Directory -Force -Path release

          # 查找构建产物并压缩
          if (Test-Path "build/bin/mimi.exe") {
            Compress-Archive -Path "build/bin/mimi.exe" -DestinationPath "release/${outputName}.zip"
          } else {
            Write-Error "找不到构建产物: build/bin/mimi.exe"
            exit 1
          }

      - name: 打包构建产物 (macOS)
        if: matrix.platform == 'darwin'
        run: |
          version="${{ github.ref_name }}"
          outputName="mimi-${version}-darwin-${{ matrix.arch }}"

          # 创建发布目录
          mkdir -p release

          # 查找构建产物并压缩
          if [ -f "build/bin/mimi.app/Contents/MacOS/mimi" ]; then
            cd build/bin
            tar -czf "../../release/${outputName}.tar.gz" mimi.app
            cd ../..
          elif [ -f "build/bin/mimi" ]; then
            tar -czf "release/${outputName}.tar.gz" -C build/bin mimi
          else
            echo "找不到构建产物"
            exit 1
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: mimi-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 显示下载的文件
        run: |
          ls -R artifacts/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/mimi-windows-amd64/*
            artifacts/mimi-darwin-amd64/*
            artifacts/mimi-darwin-arm64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧的 artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            mimi-windows-amd64
            mimi-darwin-amd64
            mimi-darwin-arm64
